name: Bootstrap repository contents

on:
  push:
    paths:
      - ".github/workflows/bootstrap.yml"

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore project snapshot
        run: |
          curl -fsSL https://edqiejhbdnjtknjmxjhj.supabase.co/storage/v1/object/public/english-coach-bootstrap/project.tar.gz -o /tmp/project.tar.gz
          tar -xzf /tmp/project.tar.gz
          rm -f .github/workflows/pages.yml

      - name: Commit project files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bootstrap English Coach website"
          git push origin HEAD:main
